<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Device Settings</title>
<link rel="stylesheet" href="/style.css">
<style>
  .card-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 3rem; }
  .eye {
    position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0; flex: none;
  }
  .eye:hover { color: var(--text); }
  .set-badge { font-size: 0.7rem; color: var(--ok); margin-left: 0.4rem; }
  .btn-row { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
  .btn-row button { flex: 1; padding: 0.9rem; width: auto; }
  .field-row { display: flex; gap: 0.75rem; }
  .field-row > div { flex: 1; }
  .field-row > div.narrow { flex: 0 0 6rem; }
</style>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body>
<button type="button" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
</button>

<h1 id="title">Settings</h1>
<p class="sub">Device credentials</p>

<div class="card">
  <div class="card-title">MQTT <span id="mqtt-badge" class="set-badge" hidden>&#10003; password saved</span></div>
  <div class="field-row">
    <div>
      <label for="mqtt-host">Broker host</label>
      <input id="mqtt-host" type="text" placeholder="192.168.1.x" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="narrow">
      <label for="mqtt-port">Port</label>
      <input id="mqtt-port" type="number" min="1" max="65535" placeholder="1883" autocomplete="off">
    </div>
  </div>
  <label for="mqtt-user">Username</label>
  <input id="mqtt-user" type="text" placeholder="leave empty if not required" autocomplete="off" autocorrect="off" spellcheck="false">
  <label for="mqtt-pass">Password</label>
  <div class="pass-wrap">
    <input id="mqtt-pass" type="password" placeholder="leave empty to clear" autocomplete="new-password">
    <button type="button" class="eye" onclick="toggleVis('mqtt-pass',this)" title="Show/hide">&#128065;</button>
  </div>
  <div class="btn-row">
    <button type="button" onclick="saveMqtt()">Save MQTT</button>
  </div>
  <div class="msg" id="mqtt-msg"></div>
</div>

<div class="card">
  <div class="card-title">Fan</div>
  <label for="fan-mac">Bluetooth MAC address</label>
  <input id="fan-mac" type="text" placeholder="AA:BB:CC:DD:EE:FF" autocomplete="off" autocorrect="off" spellcheck="false">
  <div class="btn-row">
    <button type="button" onclick="saveFan()">Save Fan</button>
  </div>
  <div class="msg" id="fan-msg"></div>
</div>

<div class="card">
  <div class="card-title">OTA Update <span id="ota-badge" class="set-badge" hidden>&#10003; password saved</span></div>
  <label for="ota-pass">Password</label>
  <div class="pass-wrap">
    <input id="ota-pass" type="password" placeholder="leave empty to use firmware default" autocomplete="new-password">
    <button type="button" class="eye" onclick="toggleVis('ota-pass',this)" title="Show/hide">&#128065;</button>
  </div>
  <div class="btn-row">
    <button type="button" onclick="saveOta()">Save OTA</button>
  </div>
  <div class="msg" id="ota-msg"></div>
</div>

<a class="back" href="/">&#8592; Back</a>

<script>
var SUN = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
function toggleTheme() {
  var light = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', light ? 'light' : 'dark');
  document.getElementById('theme-icon').innerHTML = light ? MOON : SUN;
}
document.getElementById('theme-icon').innerHTML = document.documentElement.classList.contains('light') ? MOON : SUN;

function toggleVis(id, btn) {
  var el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

fetch('/api/deviceinfo').then(function(r) { return r.json(); }).then(function(info) {
  document.getElementById('title').textContent = info.name || 'Device';
  document.title = (info.name || 'Device') + ' — Settings';
}).catch(function() {});

fetch('/api/settings').then(function(r) { return r.json(); }).then(function(s) {
  document.getElementById('mqtt-host').value = s.mqtt_host || '';
  document.getElementById('mqtt-port').value = s.mqtt_port || '';
  document.getElementById('mqtt-user').value = s.mqtt_user || '';
  document.getElementById('mqtt-pass').value = s.mqtt_pass || '';
  document.getElementById('fan-mac').value   = s.fan_mac   || '';
  if (s.mqtt_pass) document.getElementById('mqtt-badge').hidden = false;
  if (s.ota_pass_set)  document.getElementById('ota-badge').hidden  = false;
}).catch(function() {});

function post(body, msgId, successText) {
  var msg = document.getElementById(msgId);
  msg.style.color = 'var(--muted)';
  msg.textContent = 'Saving…';
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }).then(function(data) {
    msg.style.color = 'var(--ok)';
    if (data.restart) {
      msg.textContent = 'Saved — restarting…';
      setTimeout(function() { location.reload(); }, 6000);
    } else {
      msg.textContent = successText;
    }
  }).catch(function(e) {
    msg.style.color = 'var(--err)';
    msg.textContent = 'Error: ' + e.message;
  });
}

function saveMqtt() {
  var hostEl = document.getElementById('mqtt-host');
  hostEl.value = hostEl.value.trim().replace(/^https?:\/\//i, '').replace(/\/+$/, '');
  var portVal = document.getElementById('mqtt-port').value;
  var body = {
    mqtt_host: hostEl.value,
    mqtt_user: document.getElementById('mqtt-user').value,
    mqtt_pass: document.getElementById('mqtt-pass').value
  };
  if (portVal) body.mqtt_port = parseInt(portVal, 10);
  post(body, 'mqtt-msg', 'Saved — restart device to apply.');
  document.getElementById('mqtt-badge').hidden = document.getElementById('mqtt-pass').value.length === 0;
}

function saveFan() {
  post(
    { fan_mac: document.getElementById('fan-mac').value },
    'fan-msg',
    'Saved — takes effect on next boost.'
  );
}

function saveOta() {
  post(
    { ota_pass: document.getElementById('ota-pass').value },
    'ota-msg',
    'Saved — restart device to apply.'
  );
  document.getElementById('ota-badge').hidden = document.getElementById('ota-pass').value.length === 0;
}
</script>
</body>
</html>
