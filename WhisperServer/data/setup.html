<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhisperBridge Setup</title>
<link rel="stylesheet" href="/style.css">
<style>
  .card-title { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

  /* Network list */
  .net-list { display: flex; flex-direction: column; gap: 0.4rem; min-height: 2rem; }
  .net-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.75rem; background: #2a2a2a; border-radius: 8px;
    cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s;
  }
  .net-item:hover { border-color: #444; }
  .net-item.selected { border-color: #2979ff; }
  .net-name { font-size: 0.9rem; font-weight: 600; }
  .net-meta { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: #888; }
  .net-lock { color: #aaa; }
  .scanning { font-size: 0.85rem; color: #888; padding: 0.4rem 0; }

  /* Form */
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; margin-top: 1rem; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%; padding: 0.75rem 1rem; background: #2a2a2a; border: 1px solid #333;
    border-radius: 8px; color: #eee; font-size: 1rem; outline: none;
  }
  input:focus { border-color: #2979ff; }

  /* Buttons */
  .btn-row { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
  button {
    flex: 1; padding: 0.9rem; background: #2979ff; color: #fff; border: none;
    border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
    letter-spacing: 0.05em; transition: background 0.15s;
  }
  button.secondary { background: #2a2a2a; color: #aaa; flex: 0 0 auto; padding: 0.9rem 1rem; }
  button.rescan { flex: none; padding: 0.1rem 0.5rem; font-size: 0.75rem; border-radius: 6px; }
  button:not(:disabled):not(.secondary):hover { background: #1565c0; }
  button.secondary:not(:disabled):hover { background: #333; color: #eee; }

  /* URL preview */
  .url-card { background: #1e1e1e; border-radius: 12px; padding: 1rem 1.5rem; width: 100%; max-width: 360px; margin-bottom: 1rem; }
  .url-label { font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; }
  .url-link { font-size: 0.9rem; color: #2979ff; word-break: break-all; }

  #msg { margin-top: 0.75rem; width: 100%; max-width: 360px; }
</style>
</head>
<body>
<h1>WhisperBridge</h1>
<p class="sub">WiFi Setup</p>

<div class="url-card" id="url-card" hidden>
  <div class="url-label">After connecting, find your device at</div>
  <a class="url-link" id="url-link" href="#"></a>
</div>

<div class="card">
  <div class="card-title">Available Networks <span id="rescan-wrap">· <button type="button" class="secondary rescan" id="rescan" onclick="startScan()">Rescan</button></span></div>
  <div class="net-list" id="net-list"><p class="scanning">Scanning…</p></div>
</div>

<div class="card">
  <label for="ssid">Network name (SSID)</label>
  <input id="ssid" type="text" placeholder="MyNetwork" autocomplete="off" autocorrect="off" spellcheck="false">
  <label for="pass">Password</label>
  <input id="pass" type="password" placeholder="leave empty for open networks" autocomplete="off">
  <div class="btn-row">
    <button type="button" id="btn" disabled onclick="save()">Connect</button>
  </div>
</div>
<div id="msg"></div>

<script>
var selectedSsid = null;

// ── HTML escaping (prevents XSS from malicious AP SSIDs) ──────────────────────
function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Device info preview ───────────────────────────────────────────────────────
fetch('/api/deviceinfo').then(function(r) { return r.json(); }).then(function(info) {
  var link = document.getElementById('url-link');
  link.href = info.url;
  link.textContent = info.url;
  document.getElementById('url-card').hidden = false;
}).catch(function() {});

// ── SSID input enables Connect button ────────────────────────────────────────
document.getElementById('ssid').addEventListener('input', function() {
  document.getElementById('btn').disabled = this.value.trim().length === 0;
});

// ── Signal strength → bar label ───────────────────────────────────────────────
function signalLabel(rssi) {
  if (rssi >= -60) return '▂▄▆█';
  if (rssi >= -70) return '▂▄▆·';
  if (rssi >= -80) return '▂▄··';
  return '▂···';
}

// ── Network list ──────────────────────────────────────────────────────────────
function networkItemHtml(n) {
  return '<div class="net-item" data-ssid="' + escHtml(n.ssid) + '" onclick="selectNetwork(this.dataset.ssid)">' +
    '<span class="net-name">' + escHtml(n.ssid) + '</span>' +
    '<span class="net-meta">' +
      '<span style="font-family:monospace">' + signalLabel(n.rssi) + '</span>' +
      (n.secure ? '<span class="net-lock">🔒</span>' : '') +
    '</span>' +
  '</div>';
}

function selectNetwork(ssid) {
  selectedSsid = ssid;
  document.getElementById('ssid').value = ssid;
  document.getElementById('btn').disabled = false;
  document.getElementById('pass').focus();
  document.querySelectorAll('.net-item').forEach(function(el) {
    el.classList.toggle('selected', el.dataset.ssid === ssid);
  });
}

function renderNetworks(networks) {
  var list = document.getElementById('net-list');
  if (!networks.length) {
    list.innerHTML = '<p class="scanning">No networks found — try rescanning.</p>';
    return;
  }
  list.innerHTML = networks.map(networkItemHtml).join('');
  if (selectedSsid) {
    document.querySelectorAll('.net-item').forEach(function(el) {
      el.classList.toggle('selected', el.dataset.ssid === selectedSsid);
    });
  }
}

function startScan() {
  document.getElementById('net-list').innerHTML = '<p class="scanning">Scanning…</p>';
  document.getElementById('rescan').disabled = true;
  pollNetworks(0);
}

function pollNetworks(retries) {
  if (retries > 15) {
    document.getElementById('rescan').disabled = false;
    document.getElementById('net-list').innerHTML = '<p class="scanning">Scan timed out — try rescanning.</p>';
    return;
  }
  fetch('/api/networkdata').then(function(r) { return r.json(); }).then(function(data) {
    if (data.scanning) {
      setTimeout(function() { pollNetworks(retries + 1); }, 1000);
      return;
    }
    document.getElementById('rescan').disabled = false;
    renderNetworks(data.networks);
  }).catch(function() {
    document.getElementById('rescan').disabled = false;
    document.getElementById('net-list').innerHTML = '<p class="scanning">Scan failed.</p>';
  });
}

// ── Connect ───────────────────────────────────────────────────────────────────
function save() {
  var ssid = document.getElementById('ssid').value.trim();
  if (!ssid) return;
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  btn.disabled = true;
  msg.style.color = '#888';
  msg.textContent = 'Saving…';
  fetch('/api/networkset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ssid: ssid, password: document.getElementById('pass').value })
  }).then(function(r) {
    if (r.ok) {
      msg.style.color = '#4caf50';
      msg.textContent = 'Saved — device is restarting. Reconnect to your network.';
    } else { throw new Error('HTTP ' + r.status); }
  }).catch(function(e) {
    msg.style.color = '#f44336';
    msg.textContent = 'Error: ' + e.message;
    btn.disabled = false;
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') save(); });

// Start scan on load
startScan();
</script>
</body>
</html>
