<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhisperBridge</title>
<link rel="stylesheet" href="/style.css">
<style>
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 0.9rem; }
  .row:last-child { margin-bottom: 0; }
  .label { color: var(--muted); }
  .value { font-weight: 600; }
  button { width: 100%; max-width: 560px; }
  #msg { margin-top: 1rem; }
</style>
</head>
<body>
<h1>WhisperBridge</h1>
<p class="sub">Vent-Axia Svara controller</p>

<div class="card">
  <div class="row"><span class="label">Network</span><span class="value" id="ssid">—</span></div>
  <div class="row"><span class="label">IP</span><span class="value" id="ip">—</span></div>
  <div class="row"><span class="label">RSSI</span><span class="value" id="rssi">—</span></div>
  <div class="row"><span class="label">Status</span><span class="value" id="status">—</span></div>
  <div class="row"><span class="label">Last BLE</span><span class="value" id="ble_ok">—</span></div>
  <div class="row"><span class="label">Built</span><span class="value idle" id="built">—</span></div>
</div>

<button type="button" id="btn" onclick="triggerBoost()">Boost</button>
<div id="msg"></div>
<a href="setup.html" class="btn-secondary">Change network</a>
<a href="settings.html" class="btn-secondary">Settings</a>
<a href="log.html" class="btn-secondary">Logs</a>

<script>
function setMsg(txt, colour) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.color = colour || '#888';
}

function updateStatus(data) {
  document.getElementById('ssid').textContent = data.ssid || '—';
  document.getElementById('ip').textContent   = data.ip   || '—';
  document.getElementById('rssi').textContent = data.rssi != null ? data.rssi + ' dBm' : '—';

  const statusEl = document.getElementById('status');
  if (data.running) {
    statusEl.textContent = 'Running';
    statusEl.className = 'value';
    document.getElementById('btn').disabled = true;
  } else {
    statusEl.textContent = 'Idle';
    statusEl.className = 'value idle';
    document.getElementById('btn').disabled = false;
  }

  const bleEl = document.getElementById('ble_ok');
  bleEl.textContent = data.running ? '…' : (data.ble_ok ? 'OK' : 'Failed');
  bleEl.className = 'value ' + (data.running ? '' : (data.ble_ok ? 'ok' : 'fail'));
}

async function poll() {
  try {
    const res = await fetch('/api/status');
    if (res.ok) updateStatus(await res.json());
  } catch (_) {}
}

async function triggerBoost() {
  document.getElementById('btn').disabled = true;
  setMsg('Sending boost command…');
  try {
    const res = await fetch('/api/boost', { method: 'POST' });
    if (res.ok) {
      setMsg('Boost triggered — connecting to fan…', '#4caf50');
    } else {
      const j = await res.json().catch(() => ({}));
      setMsg('Error: ' + (j.error || res.status), '#f44336');
      document.getElementById('btn').disabled = false;
    }
  } catch (e) {
    setMsg('Request failed: ' + e.message, '#f44336');
    document.getElementById('btn').disabled = false;
  }
}

async function reprovision() {
  if (!confirm('Clear WiFi credentials and restart into setup mode?')) return;
  try {
    const res = await fetch('/api/reprovision', { method: 'POST' });
    if (res.ok) {
      setMsg('Restarting into setup mode…');
    } else {
      setMsg('Error: ' + res.status, '#f44336');
    }
  } catch (e) {
    setMsg('Request failed: ' + e.message, '#f44336');
  }
}

async function loadDeviceInfo() {
  try {
    const res = await fetch('/api/deviceinfo');
    if (res.ok) {
      const d = await res.json();
      if (d.built) document.getElementById('built').textContent = d.built;
    }
  } catch (_) {}
}

poll();
loadDeviceInfo();
setInterval(poll, 2000);
</script>
</body>
</html>
