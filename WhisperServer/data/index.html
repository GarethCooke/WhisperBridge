<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>WhisperBridge</title>
<link rel="stylesheet" href="/style.css">
<style>
  .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 0.9rem; }
  .row:last-child { margin-bottom: 0; }
  .label { color: var(--muted); }
  .value { font-weight: 600; }
  #btn { width: 100%; max-width: 560px; }
  #msg { margin-top: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fan-spin { display: inline-block; animation: spin 1.8s linear infinite; margin-right: 0.35em; }
  .hidden { display: none; }
</style>
<script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body>
<button type="button" class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
</button>

<h1>WhisperBridge</h1>
<p class="sub">Vent-Axia Svara controller</p>

<div class="card">
  <div class="row"><span class="label">Network</span><span class="value" id="ssid">—</span></div>
  <div class="row"><span class="label">IP</span><span class="value" id="ip">—</span></div>
  <div class="row"><span class="label">RSSI</span><span class="value" id="rssi">—</span></div>
  <div class="row"><span class="label">Status</span><span class="value" id="status">—</span></div>
  <div class="row"><span class="label">Fan</span><span class="value" id="fan_status"><span id="fan_icon" class="fan-spin hidden">✦</span><span id="fan_text">—</span></span></div>
  <div class="row"><span class="label">Last BLE</span><span class="value" id="ble_ok">—</span></div>
  <div class="row"><span class="label">Built</span><span class="value idle" id="built">—</span></div>
</div>

<button type="button" id="btn" onclick="triggerBoost()">Boost</button>
<div id="msg"></div>
<a href="setup.html" class="btn-secondary">Change network</a>
<a href="settings.html" class="btn-secondary">Settings</a>
<a href="log.html" class="btn-secondary">Logs</a>
<a href="devices.html" class="btn-secondary">Devices</a>

<script>
var SUN = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
function toggleTheme() {
  var light = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', light ? 'light' : 'dark');
  document.getElementById('theme-icon').innerHTML = light ? MOON : SUN;
}
document.getElementById('theme-icon').innerHTML = document.documentElement.classList.contains('light') ? MOON : SUN;

function setMsg(txt, colour) {
  var el = document.getElementById('msg');
  el.textContent = txt;
  el.style.color = colour || 'var(--muted)';
}

function formatCountdown(seconds) {
  if (seconds < 60) return '<1 minute';
  return Math.floor(seconds / 60) + 'm';
}

function updateStatus(data) {
  document.getElementById('ssid').textContent = data.ssid || '—';
  document.getElementById('ip').textContent   = data.ip   || '—';
  document.getElementById('rssi').textContent = data.rssi != null ? data.rssi + ' dBm' : '—';

  var statusEl = document.getElementById('status');
  if (data.running) {
    statusEl.textContent = 'Running';
    statusEl.className = 'value';
    document.getElementById('btn').disabled = true;
  } else {
    statusEl.textContent = 'Idle';
    statusEl.className = 'value idle';
    document.getElementById('btn').disabled = false;
  }

  var fanEl   = document.getElementById('fan_status');
  var fanIcon = document.getElementById('fan_icon');
  var fanText = document.getElementById('fan_text');
  if (data.boost_on) {
    fanIcon.classList.remove('hidden');
    fanText.textContent = 'Boosted · ' + data.fan_rpm + ' RPM · ' + formatCountdown(data.boost_seconds);
    fanEl.className = 'value ok';
  } else {
    fanIcon.classList.add('hidden');
    fanText.textContent = 'No Boost';
    fanEl.className = 'value idle';
  }

  var bleEl = document.getElementById('ble_ok');
  bleEl.textContent = data.running ? '…' : (data.ble_ok ? 'OK' : 'Failed');
  bleEl.className = 'value ' + (data.running ? '' : (data.ble_ok ? 'ok' : 'fail'));
}

async function poll() {
  try {
    var res = await fetch('/api/status');
    if (res.ok) updateStatus(await res.json());
  } catch (_) {}
}

async function triggerBoost() {
  document.getElementById('btn').disabled = true;
  setMsg('Sending boost command…');
  try {
    var res = await fetch('/api/boost', { method: 'POST' });
    if (res.ok) {
      setMsg('Boost triggered — connecting to fan…', 'var(--ok)');
    } else {
      var j = await res.json().catch(function() { return {}; });
      setMsg('Error: ' + (j.error || res.status), 'var(--err)');
      document.getElementById('btn').disabled = false;
    }
  } catch (e) {
    setMsg('Request failed: ' + e.message, 'var(--err)');
    document.getElementById('btn').disabled = false;
  }
}

async function loadDeviceInfo() {
  try {
    var res = await fetch('/api/deviceinfo');
    if (res.ok) {
      var d = await res.json();
      if (d.built) document.getElementById('built').textContent = d.built;
    }
  } catch (_) {}
}

poll();
loadDeviceInfo();
setInterval(poll, 2000);
</script>
</body>
</html>
